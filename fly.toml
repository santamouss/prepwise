# fly.toml app configuration file generated for parkerhero-voice on 2026-05-15T15:44:37-07:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'parkerhero-voice'
primary_region = 'sjc'

[build]
  dockerfile = 'Dockerfile.voice'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
